<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GT-1 Preset Browser</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div id="appWrap">
        <div id="leftPanel">
            <div class="sticky-top-panel">
                <h4 class="mb-3">GT-1 Preset Browser</h4>

                <div class="mb-3">
                    <label class="filter-label">Search preset / artist / song</label>
                    <input id="searchInput" type="text" class="form-control form-control-sm" placeholder="Search..." />
                </div>

                <div class="mb-3">
                    <label class="filter-label">Filter by tone</label>
                    <select id="toneFilter" class="form-select form-select-sm">
                        <option value="">All tones</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="filter-label">Filter by preset</label>
                    <select id="presetFilter" class="form-select form-select-sm">
                        <option value="">All presets</option>
                    </select>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <button id="clearBtn" class="btn btn-outline-light btn-sm w-100">Clear Filters</button>
                    </div>
                    <div class="col-6">
                        <button id="sortBtn" class="btn btn-primary btn-sm w-100">Sort: Preset</button>
                    </div>
                </div>

                <div id="resultsCount" class="results-count"></div>
                <div class="small-note mb-3">
                    Click a preset on the left to view its songs in the Phaser panel.
                </div>
            </div>
            <div id="presetList"></div>

        </div>
        <div id="gameWrap">
            <div id="phaser-game"></div>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>

</html>
