<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GT-1 Preset Browser</title>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <table>
        <tr>
            <th class="top" colspan="6">
                <h1>GT-1 Preset Browser</h1>
            </th>
        </tr>
        <tr>
            <td class="mid" colspan="6">
                <div>
                    <label>Search preset / artist / song</label>
                    <input id="searchInput" type="text" class="form-control form-control-sm" placeholder="Search..." />
                </div>
                <div class="mb-5">
                    <label>Search Tones</label> <select id="toneFilter" class="form-select form-select-sm">
                        <option value="">All tones</option>
                    </select>
                </div>
                <div class="mb-5">
                    <label>Search Presets</label>
                    <select id="presetFilter" class="form-select form-select-sm">
                        <option value="">All presets</option>
                    </select>
                </div>
                <div class="mb-5">
                    <button id="clearBtn" class="btn btn-outline-light btn-sm w-100">Clear Filters</button>
                    <button id="sortBtn" class="btn btn-primary btn-sm w-100">Sort: Preset</button>
                </div>
                <div id="resultsCount" class="results-count"></div>
                <div class="mb-3">
                    Click a preset on the left to view its songs in the Phaser panel.
                </div>
            </td>
        </tr>
        <tr>
            <td class="bottom" colspan="3">
                <div id="leftPanel">
                    <div id="presetList"></div>
                </div>
            </td>
            <td class="bottom" colspan="3">
                <div id="selectedPreset">
                </div>
            </td>
        </tr>
    </table>
    <script type="module" src="./js/main.js"></script>
</body>

</html>
